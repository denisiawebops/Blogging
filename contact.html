<body class="bg-white text-gray-900 antialiased flex flex-col min-h-screen">

    <main class="flex-grow pt-32 pb-20">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h1 class="text-4xl font-bold text-gray-900 mb-4">Get in Touch</h1>
                <p class="text-gray-600 text-lg">Tell us about your project and we'll get back to you within 24h.</p>
            </div>
            <div class="glass-panel rounded-2xl p-8 md:p-10 shadow-xl relative overflow-hidden">
                <form id="contact-form" onsubmit="handleContactSubmit(event)" class="space-y-6 relative z-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label><input type="text" name="name" required class="w-full px-4 py-3 rounded-lg border" placeholder="John Doe"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label><input type="email" name="email" required class="w-full px-4 py-3 rounded-lg border" placeholder="john@company.com"></div>
                    </div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Service Interested In</label><select name="service" class="w-full px-4 py-3 rounded-lg border"><option value="">Select a service</option><option value="web-dev">Web Development</option><option value="app-dev">App Development</option><option value="seo">SEO</option><option value="digital-marketing">Digital Marketing</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Message</label><textarea name="message" rows="4" required class="w-full px-4 py-3 rounded-lg border" placeholder="Tell us about your project..."></textarea></div>
                    <button type="submit" class="w-full btn-primary flex justify-center items-center">Send Inquiry <i data-lucide="send" class="ml-2 h-5 w-5"></i></button>
                </form>
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-blue-100 rounded-full blur-3xl pointer-events-none"></div>
                <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-blue-100 rounded-full blur-3xl pointer-events-none"></div>
            </div>

    <script>
        function toggleMobileMenu() { /* same as index */ }
        function handleContactSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const phoneNumber = "918317581308";
            const message = `Hello, I'm interested in your services.%0A%0A*Name:* ${encodeURIComponent(data.name)}%0A*Email:* ${encodeURIComponent(data.email)}%0A*Service:* ${encodeURIComponent(data.service || 'Not specified')}%0A*Message:* ${encodeURIComponent(data.message)}`;
            window.location.href = `https://wa.me/${phoneNumber}?text=${message}`;
        }
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
        window.handleContactSubmit = handleContactSubmit;
    </script>
