        // ─── Email Parser ─────────────────────────────────────────────────────────
        function parseEmailText(text) {
            // Try to extract subject, from, to, date from email headers
            const lines = text.split('\n');
            let subject = '',
                from = '',
                to = '',
                cc = '',
                date = '',
                body = text;
            let inHeaders = true;
            let headerBuffer = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (inHeaders) {
                    if (line.trim() === '') {
                        inHeaders = false;
                        body = lines.slice(i + 1).join('\n');
                        continue;
                    }
                    const lower = line.toLowerCase();
                    if (lower.startsWith('subject:')) { subject = line.substring(8).trim(); } else if (lower.startsWith(
                        'from:')) { from = line.substring(5).trim(); } else if (lower.startsWith('to:')) { to = line
                            .substring(3).trim(); } else if (lower.startsWith('cc:')) { cc = line.substring(3)
                            .trim(); } else if (lower.startsWith('date:')) { date = line.substring(5).trim(); }
                }
            }

            // Detect if body contains HTML/table markup
            const hasHtml = /<table|<\/table|<tr|<td|<th|<ul|<li|<b|<strong|<i|<u|<p|<div/.test(body);

            return {
                subject: subject || 'No Subject',
                from: from || 'Unknown Sender',
                to: to || '',
                cc: cc || '',
                date: date || fmtDate(nowISO(), true),
                body: body,
                html: hasHtml ? body : body.replace(/\n/g, '<br>'),
                hasHtml: hasHtml,
                raw: text
            };
        }

            return (
                <div className={`fixed bottom-6 right-6 ${bg} text-white px-6 py-3.5 rounded-xl shadow-2xl z-50 flex items-center gap-3 toast-slide max-w-md`}>

        // ─── Intake Page ──────────────────────────────────────────────────────────
        function IntakePage({ state, updateState, addAudit, addToast, currentUser }) {
            const [emailText, setEmailText] = useState('');
            const [parsedEmail, setParsedEmail] = useState(null);
            const [dragActive, setDragActive] = useState(false);
            const [selectedEmailId, setSelectedEmailId] = useState(null);

            const handleParse = () => {
                if (!emailText.trim()) { addToast('Please paste email content first', 'error'); return; }
                const parsed = parseEmailText(emailText);
                setParsedEmail(parsed);
                addToast('Email parsed successfully', 'success');
            };

            const handleFileUpload = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const content = ev.target.result;
                    setEmailText(content);
                    const parsed = parseEmailText(content);
                    setParsedEmail(parsed);
                    addToast('Email uploaded and parsed', 'success');
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragActive(false);
                const file = e.dataTransfer.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const content = ev.target.result;
                    setEmailText(content);
                    const parsed = parseEmailText(content);
                    setParsedEmail(parsed);
                    addToast('Email dropped and parsed', 'success');
                };
                reader.readAsText(file);
            };

            const handleDragOver = (e) => { e.preventDefault();
                setDragActive(true); };
            const handleDragLeave = (e) => { e.preventDefault();
                setDragActive(false); };

            const loadSample = (type) => {
                const sample = type === 'visa' ? SAMPLE_VISA_EMAIL : SAMPLE_HOTEL_EMAIL;
                setEmailText(sample);
                const parsed = parseEmailText(sample);
                setParsedEmail(parsed);
                addToast('Sample email loaded', 'success');
            };

            const createLeadFromEmail = () => {
                if (!parsedEmail) { addToast('Parse an email first', 'error'); return; }
                // Extract lead data from email body
                const body = parsedEmail.body || '';
                const grab = (re) => (body.match(re) || [])[1]?.trim() || '';
                const name = grab(/(?:Associate name|Guest Name|Dear)\s*[:,-]?\s*([^\n,]+)/i) || 'Guest';
                const visaReq = grab(/Visa Request ID\s*[:\-]\s*([0-9A-Za-z\-]+)/i);
                const empId = grab(/EMP ID\s*[:\-]\s*([0-9A-Za-z\-]+)/i);
                const loc = grab(/(?:Work Location|Travel Destination location)\s*[:\-]\s*([^\n]+)/i);
                const type = /visa/i.test(body) ? 'visa' : 'hotel';

                const lead = {
                    id: uid(),
                    ref: 'TT' + String(new Date().getFullYear()).slice(-2) + String(new Date().getMonth() + 1).padStart(2,
                        '0') + String(new Date().getDate()).padStart(2, '0') + String(state.sequence + 1).padStart(4,
                        '0'),
                    kind: type,
                    associateName: name,
                    empId: empId,
                    gender: 'Male',
                    workLocation: loc || '',
                    checkIn: new Date(Date.now() + 5 * 86400000).toISOString(),
                    checkOut: new Date(Date.now() + 6 * 86400000).toISOString(),
                    nights: 1,
                    occupancy: 1,
                    accommodationBudget: '',
                    specialInstruction: '',
                    status: 'new',
                    assignee: currentUser.name,
                    priority: 'normal',
                    createdAt: nowISO(),
                    createdBy: currentUser.name,
                    clientEmail: parsedEmail.from || '',
                    visaRequestId: visaReq,
                    notes: [{ at: nowISO(), by: currentUser.name, text: 'Lead created from email intake.' }],
                    history: [{ at: nowISO(), by: currentUser.name, event: 'Lead created from email intake' }]
                };
                updateState(prev => ({ ...prev, leads: [lead, ...prev.leads], sequence: prev.sequence + 1 }));
                addAudit('Created lead from email intake', lead.id, { source: 'intake' });
                addToast('Lead created from email', 'success');
            };

            // ─── Email preview renderer with table support ──────────────────
            const renderEmailBody = (html) => {
                if (!html) return null;
                // If it has HTML/table markup, render it directly
                if (/<table|<\/table|<tr|<td|<th|<ul|<li|<b|<strong|<i|<u|<p|<div/.test(html)) {
                    return <div className="email-preview" dangerouslySetInnerHTML={{ __html: html }} />;
                }
                // Otherwise, convert line breaks
                return <div className="email-preview" dangerouslySetInnerHTML={{ __html: html.replace(/\n/g, '<br>') }} />;
            };

            // ─── Email list from state ──────────────────────────────────────
            const intakeEmails = state.intakeEmails || [];

                                        <p className="text-xs text-gray-400">or</p>

                                            <i className="fas fa-folder-open mr-2"></i>Browse Files
                                            <input type="file" className="hidden" accept=".eml,.txt,.html,.msg"
                                                onChange={handleFileUpload} />
                                        </label>
                                    </div>
                                </div>

                                {/* Text area */}
                                <div className="mt-4">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Email content</label>

                                        value={emailText}
                                        onChange={(e) => setEmailText(e.target.value)}

                                        placeholder="Paste email content here..."
                                    />
                                </div>

                                <div className="flex flex-wrap gap-2 mt-4">
                                    <button
                                        onClick={handleParse}
                                        className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm transition shadow-sm flex items-center gap-2"
                                    >
                                        <i className="fas fa-play"></i> Parse Email
                                    </button>

                                        <div className="flex items-center justify-between flex-wrap gap-2">
                                            <div>
                                                <span className="font-semibold text-green-800"><i
                                                        className="fas fa-check-circle mr-1"></i> Parsed</span>
                                                <span className="text-sm text-gray-600 ml-3">Subject: {parsedEmail
                                                        .subject}</span>
                                            </div>
                                            <button

        // ─── Vouchers Page ──────────────────────────────────────────────────────────
        function VouchersPage({ state, updateState, addAudit, addToast, currentUser }) {
            const [selectedLeadId, setSelectedLeadId] = useState(state.selectedLeadId);

            const booking = lead ? state.bookings.find(b => b.leadId === lead.id) : null;
            const voucher = lead ? state.vouchers.find(v => v.leadId === lead.id) : null;

            const generateVoucher = () => {
                if (!lead) { addToast('No lead selected', 'error'); return; }
                let booking = state.bookings.find(b => b.leadId === lead.id);
                if (!booking) {
                    const bk = {
                        id: uid(),
                        leadId: lead.id,
                        hotelName: 'Sample Hotel',
                        hotelAddress: lead.workLocation || '',
                        checkIn: lead.checkIn,
                        checkOut: lead.checkOut,
                        confirmationNumber: 'CONF' + Date.now().toString().slice(-8),
                        tariffPerNight: 190,
                        currency: 'EUR',
                        nights: lead.nights || 1,
                        totalAmount: (lead.nights || 1) * 190,
                        cancellation: 'Free cancellation',
                        roomType: 'Standard',
                        guestName: lead.associateName,
                        guestArrivalDateTime: lead.checkIn,
                        createdAt: nowISO(),
                        status: 'confirmed'
                    };
                    updateState(prev => ({ ...prev, bookings: [bk, ...prev.bookings] }));
                    booking = bk;
                }
                const v = {
                    id: uid(),
                    bookingId: booking.id,
                    leadId: lead.id,
                    kind: lead.kind || 'hotel',
                    number: (lead.kind === 'visa' ? 'V' : 'H') + Date.now().toString().slice(-13),
                    generatedAt: nowISO(),
                    pdfHtml: buildVoucherHtml(lead, booking)
                };
                updateState(prev => ({ ...prev, vouchers: [v, ...prev.vouchers] }));
                addAudit('Generated voucher', lead.id, { voucher: v.number });
                addToast('Voucher generated', 'success');
            };

            const voucherHtml = voucher?.pdfHtml || (lead && booking ? buildVoucherHtml(lead, booking) : '');

            return (

                                >
                                    <i className="fas fa-file-pdf"></i> Generate
                                </button>
                                <button
                                    onClick={() => {
                                        const html = voucherHtml;

        function AnalyticsPage({ state, updateState, addAudit, addToast, currentUser }) {
            const leads = state.leads || [];
            const total = leads.length;
            const statusCounts = STATUSES.map(s => ({ status: s, count: leads.filter(l => l.status === s).length }));
            const maxCount = Math.max(1, ...statusCounts.map(s => s.count));

            const userPerformance = state.users.map(u => {
                const assigned = leads.filter(l => l.assignee === u.name).length;
                const completed = leads.filter(l => l.assignee === u.name && ['booking_confirmed',
                    'voucher_generated', 'reconfirmed', 'invoice_pending', 'closed'
                ].includes(l.status)).length;
                const score = assigned > 0 ? Math.round((completed / assigned) * 100) : 0;
                return { ...u, assigned, completed, score };
            }).sort((a, b) => b.score - a.score);

            const revenue = state.invoices.reduce((s, i) => s + Number(i.amount || 0), 0);

            return (
                <div className="space-y-4">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <KPITile label="Total Leads" value={total} icon="fa-users" color="blue" />
                        <KPITile label="Revenue" value={'₹' + revenue.toLocaleString()} icon="fa-coins" color="green" />
                        <KPITile label="Avg Score" value={total > 0 ? Math.round(userPerformance.reduce((s, u) => s + u
                                .score, 0) / userPerformance.filter(u => u.assigned > 0).length) : 0}
                        icon="fa-chart-simple" color="purple" />
                        <KPITile label="Active Users" value={state.users.filter(u => u.active !== false).length}
                        icon="fa-user-check" color="orange" />
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-5">
                        <h3 className="font-bold text-lg mb-4">Status Distribution</h3>
                        <div className="space-y-2">
                            {statusCounts.map(s => (
                                <div key={s.status} className="flex items-center gap-2">
                                    <span className="w-32 text-sm">{STATUS_LABEL[s.status]}</span>
                                    <div className="flex-1 h-4 bg-gray-100 rounded-full overflow-hidden">
                                        <div className="h-full bg-blue-600 rounded-full transition-all duration-500"
                                        style={{ width: `${(s.count / maxCount) * 100}%` }}></div>
                                    </div>
                                    <span className="text-sm font-semibold w-12 text-right">{s.count}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-5">
                        <h3 className="font-bold text-lg mb-4">User Performance</h3>
                        <div className="table-scroll">
                            <table className="w-full text-sm">
                                <thead className="bg-gray-50 text-gray-600">
                                    <tr>
                                        <th className="px-3 py-2 text-left">User</th>
                                        <th className="px-3 py-2 text-left">Role</th>
                                        <th className="px-3 py-2 text-left">Assigned</th>
                                        <th className="px-3 py-2 text-left">Completed</th>
                                        <th className="px-3 py-2 text-left">Score</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {userPerformance.map(u => (
                                        <tr key={u.id} className="border-t border-gray-100 hover:bg-gray-50">
                                            <td className="px-3 py-2 font-medium">{u.name}</td>
                                            <td className="px-3 py-2">{ROLE_LABEL[u.role]}</td>
                                            <td className="px-3 py-2">{u.assigned}</td>
                                            <td className="px-3 py-2">{u.completed}</td>
                                            <td className="px-3 py-2 font-bold">
                                                <span className={`${u.score >= 80 ? 'text-green-600' : u.score >= 50 ? 'text-orange-600' : 'text-red-600'}`}>
                                                    {u.score}%
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                    {userPerformance.length === 0 && (
                                        <tr><td colSpan="5" className="text-center py-8 text-gray-500">No data.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Admin Page ─────────────────────────────────────────────────────────────
        function AdminPage({ state, updateState, addAudit, addToast, currentUser }) {
            const users = state.users || [];

            const toggleUser = (id) => {
                updateState(prev => ({
                    ...prev,
                    users: prev.users.map(u => u.id === id ? { ...u, active: !u.active } : u)
                }));
                addAudit('Toggled user status', id);
                addToast('User status updated', 'success');
            };

            const addUser = () => {
                const name = prompt('Enter user name:');
                if (!name) return;
                const email = prompt('Enter email:');
                if (!email) return;
                const role = prompt('Role (admin/manager/agent/finance):', 'agent');
                if (!role || !ROLES.includes(role)) return;
                const user = {
                    id: uid(),
                    name: name.trim(),
                    email: email.trim().toLowerCase(),
                    password: 'password123',
                    role,
                    active: true,
                    createdAt: nowISO()
                };
                updateState(prev => ({ ...prev, users: [...prev.users, user] }));
                addAudit('Added user', user.id, { role });
                addToast('User added', 'success');
            };

            return (
                <div className="space-y-4">
                    <div className="bg-white rounded-xl shadow-sm p-5">
                        <div className="flex items-center justify-between flex-wrap gap-2 mb-4">
                            <h3 className="font-bold text-lg">User Management</h3>
                            <button
                                onClick={addUser}
                                className="px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm transition shadow-sm flex items-center gap-2"
                            >
                                <i className="fas fa-user-plus"></i> Add User
                            </button>
                        </div>
                        <div className="table-scroll">
                            <table className="w-full text-sm">
                                <thead className="bg-gray-50 text-gray-600">
                                    <tr>
                                        <th className="px-3 py-2 text-left">Name</th>
                                        <th className="px-3 py-2 text-left">Email</th>
                                        <th className="px-3 py-2 text-left">Role</th>
                                        <th className="px-3 py-2 text-left">Status</th>
                                        <th className="px-3 py-2 text-left">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {users.map(u => (
                                        <tr key={u.id} className="border-t border-gray-100 hover:bg-gray-50">
                                            <td className="px-3 py-2 font-medium">{u.name}</td>
                                            <td className="px-3 py-2">{u.email}</td>
                                            <td className="px-3 py-2">{ROLE_LABEL[u.role]}</td>
                                            <td className="px-3 py-2">
                                                <span className={`px-2.5 py-0.5 rounded-full text-xs font-semibold ${u.active !== false ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                                    {u.active !== false ? 'Active' : 'Inactive'}
                                                </span>
                                            </td>
                                            <td className="px-3 py-2">
                                                <button
                                                    onClick={() => toggleUser(u.id)}
                                                    className={`px-3 py-1.5 text-xs rounded-lg transition ${u.active !== false ? 'bg-red-600 hover:bg-red-700 text-white' : 'bg-green-600 hover:bg-green-700 text-white'}`}
                                                >
                                                    {u.active !== false ? 'Deactivate' : 'Activate'}
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-5">
                        <h3 className="font-bold text-lg mb-4">Audit Log</h3>
                        <div className="max-h-80 overflow-y-auto space-y-1">
                            {state.audit.slice(0, 25).map(log => (
                                <div key={log.id} className="flex items-start gap-3 text-sm py-2 border-b border-gray-100 last:border-0">
                                    <div className="w-2 h-2 mt-1.5 rounded-full bg-blue-500 flex-shrink-0"></div>
                                    <div>
                                        <span className="font-medium">{log.action}</span>
                                        <span className="text-gray-500 ml-2">— {log.userName}</span>
                                        <div className="text-xs text-gray-400">{fmtDate(log.at, true)}</div>
                                    </div>
                                </div>
                            ))}
                            {state.audit.length === 0 && (
                                <div className="text-center py-8 text-gray-400 text-sm">No audit entries yet.</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Profile Page ────────────────────────────────────────────────────────────
        function ProfilePage({ state, updateState, addAudit, addToast, currentUser }) {
            const [name, setName] = useState(currentUser?.name || '');
            const [email, setEmail] = useState(currentUser?.email || '');
            const [password, setPassword] = useState('');

            const updateProfile = () => {
                if (!name || !email) { addToast('Name and email required', 'error'); return; }
                updateState(prev => ({
                    ...prev,
                    users: prev.users.map(u => u.id === currentUser.id ? { ...u, name, email, password: password ||
                            u.password } : u)
                }));
                addAudit('Updated profile', currentUser.id);
                addToast('Profile updated', 'success');
                setPassword('');
            };

            return (
                <div className="bg-white rounded-xl shadow-sm p-5 max-w-xl">
                    <h3 className="font-bold text-lg mb-4">Profile</h3>
                    <div className="space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-gray-700">Name</label>
                            <input
                                type="text"
                                value={name}
                                onChange={e => setName(e.target.value)}
                                className="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition"
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700">Email</label>
                            <input
                                type="email"
                                value={email}
                                onChange={e => setEmail(e.target.value)}
                                className="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition"
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700">New Password (leave blank to keep
                                current)</label>
                            <input
                                type="password"
                                value={password}
                                onChange={e => setPassword(e.target.value)}
                                className="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition"
                            />
                        </div>
                        <div className="pt-2">
                            <button
                                onClick={updateProfile}
                                className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition shadow-sm"
                            >
                                Update Profile
                            </button>
                        </div>
                        <div className="text-sm text-gray-500">
                            <div>Role: <span className="font-semibold">{ROLE_LABEL[currentUser?.role]}</span></div>
                            <div>Joined: {fmtDate(currentUser?.createdAt, true)}</div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Render ───────────────────────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
