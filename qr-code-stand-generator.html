          const [selectedStickerShape, setSelectedStickerShape] = useState('square');

          const [title, setTitle] = useState(TEMPLATES[0].title);
          const [subtitle, setSubtitle] = useState(TEMPLATES[0].subtitle);
          const [qrUrl, setQrUrl] = useState('https://example.com');
          const [qrSize, setQrSize] = useState(55);
          const [logo, setLogo] = useState(null);
          const [displayUrl, setDisplayUrl] = useState('example.com/menu');
          const [location, setLocation] = useState('Table 12');
          const [ctaIcon, setCtaIcon] = useState(TEMPLATES[0].ctaIcon);
          const [ctaText, setCtaText] = useState(TEMPLATES[0].ctaText);
          
          const [previewZoom, setPreviewZoom] = useState(1);
          const paperRef = useRef(null);

          const activeSize = buildMode === 'stand' 
            ? STAND_SIZES.find(s => s.id === selectedStandSize) 
            : STICKER_SHAPES.find(s => s.id === selectedStickerShape);

          const qrImageSrc = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(qrUrl)}&margin=10`;

          const applyTemplate = (t) => {
              setActiveTemplate(t.id); setTheme(t.theme); setTitle(t.title); 
              setSubtitle(t.subtitle); setCtaText(t.ctaText); setCtaIcon(t.ctaIcon);
          };

          const handleLogoUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (e) => setLogo(e.target.result);
              reader.readAsDataURL(file);
            }
          };

          const handleDownload = async () => {
              if (paperRef.current && window.html2canvas) {
                const canvas = await window.html2canvas(paperRef.current, { 
                    useCORS: true, scale: 3, backgroundColor: null,
                    onclone: (clonedDoc) => {
                        const el = clonedDoc.querySelector('.paper-insert');

                            if(buildMode === 'sticker' && selectedStickerShape === 'circle') {

                </div>
                
                <div className="flex-1 overflow-y-auto p-4 sm:p-5 space-y-6 custom-scrollbar">
                  
                  {/* Step 1: Pre-Built Templates */}
                  <section>
                      <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">1. Select Use Case</h3>
                      <div className="grid grid-cols-2 gap-2">
                          {TEMPLATES.map(t => (
                              <div key={t.id} onClick={() => applyTemplate(t)} className={`template-card p-3 rounded-xl flex items-center gap-3 ${activeTemplate === t.id ? 'active' : 'bg-slate-50'}`}>
                                  <span className="text-2xl">{t.icon}</span>
                                  <span className="font-bold text-[13px] text-slate-700 leading-tight">{t.name}</span>
                              </div>
                          ))}
                      </div>
                  </section>

                  <hr className="border-slate-100"/>

                  {/* Step 2: Form/Shape */}
                  <section>
                    <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">2. Dimensions & Colors</h3>
                    <div className="space-y-4">
                        <div className="flex gap-3">
                            <div className="flex-1">
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Format Type</label>
                                {buildMode === 'stand' ? (
                                    <select value={selectedStandSize} onChange={(e) => setSelectedStandSize(e.target.value)} className="input-field text-xs font-bold">
                                        {STAND_SIZES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                ) : (
                                    <select value={selectedStickerShape} onChange={(e) => setSelectedStickerShape(e.target.value)} className="input-field text-xs font-bold">
                                        {STICKER_SHAPES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                )}
                            </div>
                            <div className="flex-1">
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Color Theme</label>
                                <select value={theme.name} onChange={(e) => setTheme(THEMES.find(t => t.name === e.target.value))} className="input-field text-xs font-bold">
                                    {THEMES.map(t => <option key={t.name} value={t.name}>{t.name}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label className="text-[10px] font-bold text-slate-500 uppercase block mb-2">Upload Brand Logo</label>
                            <input type="file" accept="image/*" onChange={handleLogoUpload} className="w-full text-xs file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-bold file:bg-blue-100 file:text-blue-700 cursor-pointer"/>
                            {logo && <button onClick={() => setLogo(null)} className="text-[10px] text-red-500 font-bold mt-2">Remove Logo</button>}
                        </div>
                    </div>
                  </section>

                  <hr className="border-slate-100"/>

                  {/* Step 3: Content */}
                  <section className="pb-4">
                    <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">3. Text & QR Destination</h3>
                    <div className="space-y-3">
                      <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Main Headline</label><input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="input-field font-bold" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Instructions / Subtitle</label><input type="text" value={subtitle} onChange={(e) => setSubtitle(e.target.value)} className="input-field text-sm" /></div>
                      
                      <div className="bg-blue-50 border border-blue-100 p-3 rounded-lg">
                          <label className="block text-[10px] font-bold text-blue-700 uppercase mb-1">Destination URL</label>
                          <input type="url" value={qrUrl} onChange={(e) => setQrUrl(e.target.value)} className="input-field text-xs font-mono" placeholder="https://..." />
                      </div>

                      <div className="bg-slate-50 p-3 rounded-lg border border-slate-200"><div className="flex justify-between items-center mb-2"><label className="block text-[10px] font-bold text-slate-500 uppercase">QR Size Adjust</label><span className="text-xs font-bold text-indigo-600">{qrSize}%</span></div><input type="range" min="30" max="85" value={qrSize} onChange={(e) => setQrSize(e.target.value)} /></div>
                      
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">CTA Icon</label>
                          <select value={ctaIcon} onChange={(e) => setCtaIcon(e.target.value)} className="input-field text-xs font-bold">
                            <option value="Link">Web Link</option>
                            <option value="fa-google">Google</option>
                            <option value="fa-instagram">Instagram</option>
                            <option value="fa-facebook">Facebook</option>
                            <option value="fa-whatsapp">WhatsApp</option>
                          </select>
                        </div>
                        <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">CTA Label</label><input type="text" value={ctaText} onChange={(e) => setCtaText(e.target.value)} className="input-field text-xs font-bold" /></div>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Footer Link Tag</label><input type="text" value={displayUrl} onChange={(e) => setDisplayUrl(e.target.value)} className="input-field text-xs" /></div>
                        <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Location / Table</label><input type="text" value={location} onChange={(e) => setLocation(e.target.value)} className="input-field text-xs" /></div>
                      </div>
                    </div>
                  </section>
                </div>
                
                {/* Checkouts */}
                <div className="p-5 bg-white border-t border-slate-200 z-10 shrink-0 shadow-[0_-10px_20px_rgba(0,0,0,0.03)]">
                  <button onClick={proceedToOrder} className="w-full bg-blue-700 hover:bg-blue-800 text-white font-extrabold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                    <Icons.ShoppingCart /> Pre-Order This Setup
                  </button>
                  <button onClick={handleDownload} className="w-full text-xs text-slate-500 font-bold py-3 mt-1 hover:text-blue-600 transition flex items-center justify-center gap-1">
                     <Icons.Download /> Just download the image (Free)
                  </button>
                </div>
              </div>

              {/* RIGHT: Immersive 3D Render Area */}
              <div className="flex-1 relative overflow-hidden flex items-center justify-center min-h-[500px] lg:h-full w-full immersive-cafe-bg">
                <div className="absolute bottom-0 left-0 right-0 h-[45%] immersive-counter-table z-0"></div>
                <div className="absolute bottom-0 w-full h-[30%] bg-gradient-to-t from-black/80 to-transparent z-0 pointer-events-none"></div>

                {/* Zoom Controls */}
                <div className="absolute top-4 right-4 z-50 flex items-center gap-1 bg-white/20 backdrop-blur-md border border-white/30 p-1.5 rounded-xl shadow-lg text-white">
                    <button onClick={() => setPreviewZoom(z => Math.max(0.5, z - 0.1))} className="p-2 hover:bg-white/20 rounded-lg transition"><Icons.ZoomOut /></button>
                    <span className="text-xs font-bold w-12 text-center drop-shadow-md">{Math.round(previewZoom * 100)}%</span>
                    <button onClick={() => setPreviewZoom(z => Math.min(2.0, z + 0.1))} className="p-2 hover:bg-white/20 rounded-lg transition"><Icons.ZoomIn /></button>
                </div>
                
                {/* Dynamic Container Based on Mode */}
                <div className="relative z-10 flex flex-col items-center justify-center transition-all duration-500 ease-out pb-8" 
                     style={{ 
                         height: buildMode === 'stand' ? 'min(65vh, 700px)' : 'min(50vh, 550px)', 
                         aspectRatio: `${activeSize.w_in} / ${activeSize.h_in + (buildMode === 'stand' ? 0.5 : 0)}`, 
                         maxHeight: '800px', maxWidth: '85vw', 
                         transform: buildMode === 'sticker' 
                             ? `scale(${previewZoom}) rotateX(35deg) translateZ(10px) translateY(50px)` 
                             : `scale(${previewZoom})`, 
                         transformOrigin: 'bottom center' 
                     }}>
                  
                  {/* Standee Rendering */}
                  {buildMode === 'stand' && (
                      <>
                      <div className="acrylic-panel w-full h-full flex items-center justify-center relative shadow-glass">
                        <div className="acrylic-glare"></div>
                        <div ref={paperRef} className={`paper-insert w-full h-full flex flex-col items-center p-3 sm:p-5 rounded-lg ${theme.bg} overflow-hidden`}>
                            <div className={`relative w-full h-full flex flex-col items-center justify-between rounded-xl p-4 sm:p-6 bg-white shadow-sm border border-slate-100`}>
                                <div className="absolute -top-8 sm:-top-10 left-0 right-0 mx-auto w-16 h-16 sm:w-20 sm:h-20 bg-white rounded-full shadow-md border-[4px] border-white flex items-center justify-center p-1 z-20 overflow-hidden box-border">
                                    {logo ? <div className="w-full h-full rounded-full" style={{ backgroundImage: `url(${logo})`, backgroundSize: 'contain', backgroundPosition: 'center', backgroundRepeat: 'no-repeat' }}></div> 
                                          : <div className="text-slate-300 font-bold text-[10px] text-center leading-tight">LOGO<br/>HERE</div>}
                                </div>
                                <div className="w-full flex flex-col items-center text-center z-10 shrink-0 pt-6 sm:pt-8">
                                    <h2 className="font-extrabold tracking-tight leading-[1.1]" style={{ color: theme.primaryText, fontSize: `clamp(1rem, ${activeSize.w_in * 1.5}cqw, 2.5rem)` }}>{title}</h2>
                                    {subtitle && <p className="font-medium opacity-90 leading-snug mt-2 px-2" style={{ color: theme.subText, fontSize: `clamp(0.6rem, ${activeSize.w_in * 0.5}cqw, 0.9rem)` }}>{subtitle}</p>}
                                </div>
                                <div className="w-full flex justify-center my-2 sm:my-4 z-10 relative shrink-0">
                                    <div className={`p-2.5 sm:p-3 rounded-2xl shadow-sm bg-white border border-slate-100 flex flex-col items-center justify-center relative`} style={{ width: `${qrSize}%`, aspectRatio: '1/1', minWidth: '90px' }}>
                                        <img src={qrImageSrc} alt="QR" className="w-full h-full object-contain mix-blend-multiply" crossOrigin="anonymous" />
                                        {ctaText && <div className="absolute -bottom-3 sm:-bottom-4 bg-indigo-600 text-white font-bold px-3 py-1 sm:py-1.5 rounded-full border-2 border-white shadow-sm z-20 flex items-center gap-1 whitespace-nowrap" style={{ fontSize: `clamp(0.5rem, ${activeSize.w_in * 0.35}cqw, 0.9rem)` }}>
                                            {renderCtaIcon()} {ctaText}
                                        </div>}
                                    </div>
                                </div>
                                <div className="w-full pt-3 sm:pt-4 border-t border-current/10 flex flex-row items-center justify-between z-10 mt-auto shrink-0" style={{ color: theme.subText, fontSize: `clamp(0.5rem, ${activeSize.w_in * 0.4}cqw, 0.8rem)` }}>
                                   <div className="flex items-center gap-1.5 font-bold tracking-wide opacity-80">{renderCtaIcon()}<span className="truncate max-w-[120px]">{displayUrl}</span></div>
                                   <div className="flex items-center gap-1.5 font-bold tracking-wide bg-current/5 px-2 py-1 rounded-md opacity-90"><Icons.MapPin /><span className="truncate">{location}</span></div>
                                </div>
                            </div>
                        </div>
                      </div>
                      <div className="stand-base"></div>
                      <div className="absolute -bottom-10 w-[130%] h-16 stand-drop-shadow blur-xl rounded-[100%] z-0"></div>
                      </>
                  )}

                  {/* Vinyl Sticker Rendering */}
                  {buildMode === 'sticker' && (
                      <div className="w-full h-full flex items-center justify-center relative z-10 group">
                          <div ref={paperRef} className={`paper-insert sticker-panel w-full h-full flex flex-col items-center justify-center p-3 sm:p-5 ${theme.bg} overflow-hidden relative shadow-[0_10px_20px_rgba(0,0,0,0.2)]`} style={{ borderRadius: activeSize.radius || '0px' }}>
                             <div className="sticker-glare"></div>
                             
                             <div className="w-full h-full flex flex-col items-center justify-between p-2 relative z-30">
                                 {logo && <img src={logo} alt="Logo" className="w-12 h-12 sm:w-16 sm:h-16 object-contain drop-shadow-sm shrink-0"/>}
                                 
                                 <div className="text-center w-full my-auto flex flex-col items-center justify-center">
                                     {title && <h2 className="font-black tracking-tighter leading-[1.1] w-[90%]" style={{ color: theme.primaryText, fontSize: `clamp(0.9rem, ${activeSize.w_in * 1.8}cqw, 2.5rem)` }}>{title}</h2>}
                                     {subtitle && <p className="font-semibold leading-tight mt-1 mb-2 opacity-90 w-[85%]" style={{ color: theme.subText, fontSize: `clamp(0.5rem, ${activeSize.w_in * 0.5}cqw, 0.8rem)` }}>{subtitle}</p>}
                                     
                                     <div className="bg-white p-2 sm:p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center relative mt-2" style={{ width: `${qrSize}%`, aspectRatio: '1/1', minWidth: '80px', maxWidth: '200px' }}>
                                         <img src={qrImageSrc} alt="QR" className="w-full h-full object-contain mix-blend-multiply" crossOrigin="anonymous" />
                                         {ctaText && <div className="absolute -bottom-3 bg-black text-white font-bold px-2.5 py-1 rounded-full border border-white shadow-md z-20 flex items-center gap-1 whitespace-nowrap" style={{ fontSize: `clamp(0.45rem, ${activeSize.w_in * 0.35}cqw, 0.8rem)` }}>
                                            {renderCtaIcon()} {ctaText}
                                         </div>}
                                     </div>
                                 </div>

                                 {activeSize.id !== 'circle' && (
                                     <div className="w-full mt-3 pt-2 border-t border-black/10 flex justify-between font-bold" style={{ color: theme.primaryText, fontSize: `clamp(0.5rem, ${activeSize.w_in * 0.4}cqw, 0.75rem)` }}>
                                        <span>{displayUrl}</span><span>{location}</span>
                                     </div>
                                 )}
                             </div>
                          </div>
                          <div className="absolute -bottom-2 w-[90%] h-4 sticker-shadow blur-md rounded-full z-0 pointer-events-none"></div>
                      </div>
                  )}

                </div>
              </div>
            </div>
          );
        }

        // --- 2. ORDER MODAL APP ---
        function OrderFlow() {
            const [isOpen, setIsOpen] = useState(false);
            const [defaultMode, setDefaultMode] = useState('stand');
            
            const [standeeQty, setStandeeQty] = useState(1);
            const [stickerQty, setStickerQty] = useState(0);
            const [hasFunctionalMenu, setHasFunctionalMenu] = useState(true);
            const [formData, setFormData] = useState({ name: '', email: '', phone: '', whatsapp: '', address: '', state: '', pincode: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isSuccess, setIsSuccess] = useState(false);

            useEffect(() => {
                window.openOrderModal = (mode = 'stand') => { 
                    setDefaultMode(mode);
                    if(mode === 'sticker') { setStandeeQty(0); setStickerQty(5); } 
                    else { setStandeeQty(1); setStickerQty(0); }
                    setIsOpen(true); setIsSuccess(false); 
                };
                return () => { delete window.openOrderModal; };
            }, []);

            const EMAILJS_SERVICE_ID = 'service_avghp1d';
            const EMAILJS_TEMPLATE_ID = 'template_2plsegm'; 

            const subtotal = (standeeQty * 350) + (stickerQty * 45) + (hasFunctionalMenu ? 1950 : 0);
            const tax = subtotal * 0.18;
            const shipping = (standeeQty > 0 || stickerQty > 0) ? 150 : 0; 
            const total = subtotal + tax + shipping;
            const formatMoney = (val) => `₹${val.toFixed(2)}`;

            const handleFormSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const templateParams = {
                    from_name: formData.name, customer_email: formData.email, customer_phone: formData.phone,
                    customer_whatsapp: formData.whatsapp || 'N/A', delivery_address: `${formData.address}, ${formData.state} - ${formData.pincode}`,
                    standee_qty: standeeQty, sticker_qty: stickerQty, functional_menu: hasFunctionalMenu ? 'Yes (₹1,950)' : 'No',
                    total_amount: total.toFixed(2)
                };

                try {
                    if(window.emailjs && EMAILJS_SERVICE_ID !== 'YOUR_SERVICE_ID') {
                        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                        setIsSuccess(true);
                    } else { setTimeout(() => setIsSuccess(true), 1200); }
                } catch (error) { alert("There was an issue processing your order."); }
                setIsSubmitting(false);
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                   <div className="bg-white w-full max-w-5xl h-[90vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row relative">
                       <button onClick={() => setIsOpen(false)} className="absolute top-4 right-4 z-30 bg-white text-slate-800 p-2 rounded-full shadow-lg hover:bg-slate-100 transition"><Icons.X /></button>

                       {isSuccess ? (
                           <div className="w-full h-full flex flex-col items-center justify-center p-8 text-center bg-indigo-50">
                               <div className="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mb-6 text-white shadow-lg shadow-green-500/30"><Icons.Check /></div>
                               <h2 className="text-4xl font-black text-slate-900 mb-4">Request Received!</h2>
                               <p className="text-lg text-slate-600 max-w-md mb-8">Thank you, {formData.name}. We securely received your custom setup request. Our team will contact you on {formData.phone} shortly.</p>
                               <button onClick={() => setIsOpen(false)} className="bg-indigo-600 text-white font-bold px-8 py-3 rounded-lg shadow-md hover:bg-indigo-700 transition">Close Checkout</button>
                           </div>
                       ) : (
                           <>
                               <div className="w-full md:w-1/2 bg-slate-50 border-r border-slate-200 flex flex-col h-full overflow-y-auto p-6 md:p-8 custom-scrollbar">
                                  <h3 className="text-2xl font-black mb-6 text-slate-900 border-b border-slate-200 pb-4">1. Hardware & System</h3>
                                  <div className="space-y-4">
                                       <label className="flex items-start gap-3 p-4 bg-white rounded-xl border border-blue-200 cursor-pointer shadow-sm hover:border-blue-400 transition">
                                            <input type="checkbox" checked={hasFunctionalMenu} onChange={e => setHasFunctionalMenu(e.target.checked)} className="mt-1 w-5 h-5 text-blue-600 rounded border-gray-300" />
                                            <div>
                                                <div className="font-bold text-slate-900">ECHO Software License (₹1,950/table)</div>
                                                <div className="text-xs text-slate-500 mt-1">Full digital dashboard, live reports, custom Google Maps linking, & AI SEO schema integration.</div>
                                            </div>
                                        </label>
                                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-4">
                                            <div className="flex justify-between items-center">
                                                <div><div className="font-bold text-slate-900">Premium Acrylic Standee</div><div className="text-xs text-slate-500 mt-0.5">Physical print (India only) • ₹350/ea</div></div>
                                                <input type="number" min="0" value={standeeQty} onChange={e => setStandeeQty(parseInt(e.target.value)||0)} className="w-16 p-2 border rounded-lg text-center font-bold" />
                                            </div>
                                            <hr className="border-slate-100"/>
                                            <div className="flex justify-between items-center">
                                                <div><div className="font-bold text-slate-900">Vinyl QR Stickers</div><div className="text-xs text-slate-500 mt-0.5">Die-cut table/window decals • ₹45/ea</div></div>
                                                <input type="number" min="0" value={stickerQty} onChange={e => setStickerQty(parseInt(e.target.value)||0)} className="w-16 p-2 border rounded-lg text-center font-bold" />
                                            </div>
                                        </div>
                                  </div>
                               </div>

                               <div className="w-full md:w-1/2 bg-white flex flex-col h-full overflow-y-auto p-6 md:p-8 custom-scrollbar">
                                    <h3 className="text-2xl font-black mb-6 text-slate-900 border-b border-slate-100 pb-4">2. Delivery Details</h3>
                                    <form onSubmit={handleFormSubmit} className="flex flex-col flex-1 h-full">
                                        <div className="space-y-3 mb-6 flex-1">
                                             <div className="grid grid-cols-2 gap-3">
                                                 <input type="text" placeholder="Full Name" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} className="p-3 text-sm border border-slate-300 rounded-lg w-full outline-none focus:border-blue-500" required />
                                                 <input type="email" placeholder="Email" value={formData.email} onChange={e=>setFormData({...formData, email: e.target.value})} className="p-3 text-sm border border-slate-300 rounded-lg w-full outline-none focus:border-blue-500" required />
                                             </div>
                                             <div className="grid grid-cols-2 gap-3">
                                                 <input type="tel" placeholder="Phone Number" value={formData.phone} onChange={e=>setFormData({...formData, phone: e.target.value})} className="p-3 text-sm border border-slate-300 rounded-lg w-full outline-none focus:border-blue-500" required />
                                                 <input type="tel" placeholder="WhatsApp" value={formData.whatsapp} onChange={e=>setFormData({...formData, whatsapp: e.target.value})} className="p-3 text-sm border border-slate-300 rounded-lg w-full outline-none focus:border-blue-500" />
                                             </div>
                                             <textarea placeholder="Delivery Address / Restaurant Details..." value={formData.address} onChange={e=>setFormData({...formData, address: e.target.value})} className="p-3 text-sm border border-slate-300 rounded-lg w-full outline-none resize-none focus:border-blue-500" rows="2" required></textarea>
                                             <div className="grid grid-cols-2 gap-3">
                                                 <input type="text" placeholder="State/City" value={formData.state} onChange={e=>setFormData({...formData, state: e.target.value})} className="p-3 text-sm border border-slate-300 rounded-lg w-full outline-none focus:border-blue-500" required />
                                                 <input type="text" placeholder="PIN Code" value={formData.pincode} onChange={e=>setFormData({...formData, pincode: e.target.value})} className="p-3 text-sm border border-slate-300 rounded-lg w-full outline-none focus:border-blue-500" required />
                                             </div>
                                        </div>

                                        <div className="bg-slate-900 text-white p-5 rounded-xl shrink-0 shadow-lg">
                                             <div className="flex justify-between text-sm mb-2"><span className="text-slate-400">Items Total</span><span className="font-medium">{formatMoney(subtotal)}</span></div>
                                             <div className="flex justify-between text-sm mb-2"><span className="text-slate-400">Shipping</span><span className="font-medium">{formatMoney(shipping)}</span></div>
                                             <div className="flex justify-between text-sm mb-4"><span className="text-slate-400">GST (18%)</span><span className="font-medium">{formatMoney(tax)}</span></div>
                                             <div className="flex justify-between font-black text-2xl pt-4 border-t border-slate-700 text-cyan-400">
                                                <span>Total Expected</span>
                                                <span>{formatMoney(total)}</span>
                                             </div>
                                             <button type="submit" disabled={isSubmitting || total === 0} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-lg py-4 rounded-xl mt-6 transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                                                {isSubmitting ? 'SENDING REQUEST...' : 'SUBMIT PRE-ORDER'}
                                             </button>
                                        </div>
                                    </form>
                               </div>
                           </>
                       )}
                   </div>
               </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('qr-designer-root')).render(<App />);
        ReactDOM.createRoot(document.getElementById('order-root')).render(<OrderFlow />);
    </script>
</body>
</html>
